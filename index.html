<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神谷大智 | ポートフォリオ</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background-color: #f8f9fa;
      color: #2d2d2d;
      line-height: 1.7;
    }

    header {
      background-color: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #1a1a1a;
    }

    nav a {
      text-decoration: none;
      color: #555;
      font-size: 0.9rem;
      margin-left: 28px;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #3b82f6;
    }

    .hero {
      max-width: 760px;
      margin: 100px auto 80px;
      padding: 0 24px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .hero .subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 32px;
    }

    .hero .intro {
      font-size: 1.05rem;
      color: #444;
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 24px 32px;
      line-height: 1.9;
    }

    section {
      max-width: 760px;
      margin: 0 auto 80px;
      padding: 0 24px;
    }

    section h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: 2px solid #3b82f6;
      display: inline-block;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .skill-card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 20px 28px;
      flex: 1 1 200px;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .skill-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .skill-card .icon {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .skill-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .skill-card p {
      font-size: 0.85rem;
      color: #777;
    }

    .contact {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
    }

    .contact p {
      color: #555;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .contact a {
      display: inline-block;
      background-color: #3b82f6;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background-color 0.2s;
    }

    .contact a:hover {
      background-color: #2563eb;
    }

    footer {
      text-align: center;
      padding: 32px;
      font-size: 0.82rem;
      color: #aaa;
      border-top: 1px solid #e8e8e8;
      background: #ffffff;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2rem;
      }

      header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">神谷大智</div>
    <nav>
      <a href="#skills">スキル</a>
      <a href="#contact">お問い合わせ</a>
    </nav>
  </header>

  <div class="hero">
    <h1>神谷大智</h1>
    <p class="subtitle">Daichi Kamiya</p>
    <p class="intro">
      同志社大学1年生。AIツールを使ったWebアプリ開発ができます。
    </p>
  </div>

  <section id="skills">
    <h2>スキル</h2>
    <div class="skills">
      <div class="skill-card">
        <div class="icon">⚙️</div>
        <h3>Bubble</h3>
        <p>ノーコードでWebアプリを構築。データベース設計からUI実装まで対応。</p>
      </div>
      <div class="skill-card">
        <div class="icon">🎨</div>
        <h3>Figma</h3>
        <p>UIデザインやプロトタイプ作成。直感的なデザインシステムを構築。</p>
      </div>
      <div class="skill-card">
        <div class="icon">🤖</div>
        <h3>AI活用開発</h3>
        <p>Claude Codeを用いたAI支援による効率的なWebアプリ開発。</p>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2>お問い合わせ</h2>
    <div class="contact">
      <p>お仕事のご依頼やご質問はメールからお気軽にどうぞ。</p>
      <a href="mailto:daichi05xxx@gmail.com">メールを送る</a>
    </div>
  </section>

  <footer>
    &copy; 2026 神谷大智. All rights reserved.
  </footer>

</body>
</html>
